name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          install-mode: goinstall

      - name: Lint OpenAPI Spec (Spectral)
        uses: stoplightio/spectral-action@v0.8.2
        with:
          file_glob: 'openapi.yaml'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run Unit Tests
        run: go test -v -short ./...
      - name: Run Integration Tests
        # This requires Docker for Testcontainers
        run: go test -v ./internal/storage/postgres/... ./internal/transport/http/...

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t payment-gateway:test .
      - name: Observability Smoke Test
        run: |
          docker run -d --name smoke-test -p 8080:8080 payment-gateway:test
          sleep 5
          curl --fail http://localhost:8080/health || exit 1
          curl --fail http://localhost:8080/metrics || exit 1
          docker rm -f smoke-test
