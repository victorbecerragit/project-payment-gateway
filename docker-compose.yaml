services:
  db:
    image: postgres:15-alpine
    container_name: payment-gateway-db
    environment:
      - POSTGRES_DB=payment_gateway
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payment_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  payment-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - LOG_LEVEL=info
      - STORAGE_TYPE=postgres
      - DATABASE_URL=postgres://user:pass@db:5432/payment_gateway?sslmode=disable
      - STRIPE_API_KEY=${STRIPE_API_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-10.0}
      - API_BURST=${API_BURST:-20}
      - WEBHOOK_RATE_LIMIT=${WEBHOOK_RATE_LIMIT:-50.0}
      - WEBHOOK_BURST=${WEBHOOK_BURST:-100}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
