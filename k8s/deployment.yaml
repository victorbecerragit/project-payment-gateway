apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: default
  labels:
    app: payment-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: payment-gateway
        image: payment-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        # --- ConfigMap: runtime settings ---
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: LOG_LEVEL
        - name: PROVIDER
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: PROVIDER
        - name: STORAGE_TYPE
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: STORAGE_TYPE
        - name: SUPPORTED_CURRENCIES
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: SUPPORTED_CURRENCIES
        - name: API_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: API_RATE_LIMIT
        - name: API_BURST
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: API_BURST
        - name: WEBHOOK_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: WEBHOOK_RATE_LIMIT
        - name: WEBHOOK_BURST
          valueFrom:
            configMapKeyRef:
              name: payment-gateway-config
              key: WEBHOOK_BURST
        # --- Secret: sensitive credentials ---
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: payment-gateway-secrets
              key: STRIPE_API_KEY
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: payment-gateway-secrets
              key: STRIPE_WEBHOOK_SECRET
        # DATABASE_URL is required when STORAGE_TYPE=postgres
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: payment-gateway-secrets
              key: DATABASE_URL
              optional: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "echo 'Container is shutting down...' && sleep 10"] # Allow time for in-flight requests to complete during shutdown
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
