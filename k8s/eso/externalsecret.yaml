# externalsecret.yaml
# Defines WHAT secrets to pull and WHERE to put them.
# The SecretStore (below) defines HOW to authenticate to the secret manager.
#
# ESO will create and keep in sync a K8s Secret named "payment-gateway-secrets"
# in the default namespace — exactly what deployment.yaml already expects.
#
# RefreshInterval: ESO re-reads from the secret manager every 1h.
# To force immediate refresh: kubectl annotate es payment-gateway-secrets force-sync=$(date +%s)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-gateway-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: payment-gateway-secret-store
  target:
    name: payment-gateway-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: STRIPE_API_KEY
    remoteRef:
      key: "api_key"

  - secretKey: STRIPE_WEBHOOK_SECRET
    remoteRef:
      key: "webhook_secret"

  - secretKey: DATABASE_URL
    remoteRef:
      key: "url"