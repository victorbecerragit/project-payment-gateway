# frontend.yaml
# Serves the static Payment Gateway Demo frontend (demo/frontend/index.html).
#
# The frontend is baked into the image via a ConfigMap and served by nginx:alpine,
# which is lighter and more reliable than python3 -m http.server for K8s.
#
# ⚠ BASE_URL note:
#   The frontend JavaScript resolves the gateway URL as:
#     http://${location.hostname}:8080
#   This means the browser will call port 8080 on the same host it loaded the page from.
#   For demo via port-forward:
#     kubectl port-forward svc/payment-gateway 8080:80 &
#     kubectl port-forward svc/frontend        3000:80 &
#   Then open http://localhost:3000 — JS calls http://localhost:8080 ✅
#
#   For ingress: the gateway must be reachable at the same hostname on port 8080,
#   or you patch BASE_URL in the ConfigMap below.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: default
  labels:
    app: frontend
data:
  # Patch GATEWAY_URL here if your ingress exposes the gateway on a different host/port.
  # Default: the JS uses http://${location.hostname}:8080 (works with port-forward).
  # To override, replace the BASE_URL line in index.html below:
  #   const BASE_URL = "http://payment-gateway.127.0.0.1.nip.io";
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Serve index.html for all routes (SPA-friendly)
        location / {
            try_files $uri /index.html;
        }

        # Health check for K8s probes
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
      # Clone the repo and copy demo/frontend/index.html into the shared volume.
      # This avoids building a custom Docker image for a single static file.
      # For production: build a proper image with the HTML baked in.
      - name: fetch-frontend
        image: alpine/git:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Cloning repo to get demo/frontend/index.html..."
          git clone --depth=1 https://github.com/victorbecerragit/project-payment-gateway /tmp/repo
          cp /tmp/repo/demo/frontend/index.html /html/index.html
          echo "Done. File size: $(wc -c < /html/index.html) bytes"
        volumeMounts:
        - name: html
          mountPath: /html
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - name: http
          containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
      volumes:
      - name: html
        emptyDir: {}
      - name: nginx-config
        configMap:
          name: frontend-html
          items:
          - key: nginx.conf
            path: nginx.conf
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP