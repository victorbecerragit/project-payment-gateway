apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-gateway-ingress
  namespace: default
  labels:
    app: payment-gateway
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, X-Idempotency-Key, X-Correlation-ID, Stripe-Signature"
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  rules:
  # ── Frontend: served at http://payment-gateway.127.0.0.1.nip.io/ ─────────
  # The JS will call http://payment-gateway.127.0.0.1.nip.io:8080 for the API.
  # Use port-forward on 8080 → payment-gateway svc for that to resolve locally.
  - host: payment-gateway.127.0.0.1.nip.io
    http:
      paths:
      # Webhook route first (more specific)
      - path: /()(api/v1/webhooks/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-gateway
            port:
              number: 80
      # API routes
      - path: /()(api/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-gateway
            port:
              number: 80
      # Health/ready probes
      - path: /()(health|ready|metrics)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-gateway
            port:
              number: 80
      # Frontend — catch-all, must be last
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 80