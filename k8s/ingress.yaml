apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-gateway-ingress
  namespace: default
  labels:
    app: payment-gateway
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Idempotency-Key,X-Correlation-ID,Stripe-Signature,Origin,Accept"
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # Webhook route first (more specific)
      - path: /()(api/v1/webhooks/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-gateway
            port:
              number: 8080
      # API routes
      - path: /()(api/.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-gateway
            port:
              number: 8080
      # Health/ready probes
      - path: /()(health|ready|metrics)
        pathType: ImplementationSpecific
        backend:
          service:
            name: payment-gateway
            port:
              number: 8080
      # Frontend — catch-all, must be last
      - path: /()(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend
            port:
              number: 80