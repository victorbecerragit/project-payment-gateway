# k8s/kustomize/frontend/kustomization.yaml
# Applies the frontend Deployment, Service, and ConfigMap.
#
# Usage (standalone):
#   kubectl apply -k k8s/kustomize/frontend/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - frontend.yml

configMapGenerator:
  - name: frontend-assets
    files:
      - index.html
      - nginx.conf
