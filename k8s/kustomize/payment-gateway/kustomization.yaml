# k8s/kustomize/payment-gateway/kustomization.yaml
# Applies all payment-gateway resources:
#   ConfigMap, Deployment, Service, HPA, Ingress.
#
# Depends on:
#   - payment-gateway-secrets (created by ESO)
#   - postgres Service (created by postgres component)
#
# Usage (standalone):
#   kubectl apply -k k8s/kustomize/payment-gateway/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml
