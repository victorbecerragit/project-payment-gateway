# k8s/kustomize/postgres/kustomization.yaml
# Applies the Postgres secret and StatefulSet.
#
# Usage (standalone):
#   kubectl apply -k k8s/kustomize/postgres/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../k8s/postgres-secret.yaml
  - ../../../k8s/postgres.yaml
