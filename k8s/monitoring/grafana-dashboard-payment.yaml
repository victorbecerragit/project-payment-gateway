apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: payment-ops-dashboard
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-operator
  json: |
    {
      "title": "Payment Operations",
      "panels": [
        {
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "title": "Event Publication Rate",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(payment_events_published_total[5m])",
              "legendFormat": "{{event_type}} - {{status}}"
            }
          ]
        },
        {
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "title": "Publish Errors",
          "type": "graph",
          "targets": [
            {
              "expr": "payment_events_published_total{status=\"error\"}",
              "legendFormat": "{{event_type}}"
            }
          ]
        },
        {
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "title": "DLQ Volume",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(payment_dlq_total[5m])",
              "legendFormat": "{{event_type}}"
            }
          ]
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 4,
          "title": "Consumer Processing Duration (p99)",
          "type": "graph",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(payment_processing_duration_seconds_bucket[5m]))",
              "legendFormat": "{{event_type}}"
            }
          ]
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 5,
          "title": "Consumer Retries",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(payment_consumer_retry_total[5m])",
              "legendFormat": "{{event_type}}"
            }
          ]
        }
      ],
      "schemaVersion": 27
    }
