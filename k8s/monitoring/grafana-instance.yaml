apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-operator
spec:
  version: 13.0.1
  config:
    security:
      admin_user: admin
      admin_password: admin
    server:
      root_url: http://localhost:3000
  service:
    spec:
      type: ClusterIP
      ports:
        - name: grafana
          port: 3000
          targetPort: 3000
