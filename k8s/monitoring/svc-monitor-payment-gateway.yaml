apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: payment-gateway
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  selector:
    matchLabels:
      app: payment-gateway
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
